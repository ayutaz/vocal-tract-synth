<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>声道シンセサイザー</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <h1>声道シンセサイザー</h1>
      <div id="canvas-container">
        <canvas id="tract-canvas"></canvas>
      </div>
      <div id="controls">
        <button id="start-stop-btn" type="button">Start</button>
        <span id="status-text">停止中</span>
        <span id="error-text" class="error" hidden></span>
      </div>
      <div id="presets">
        <button class="preset-btn" data-vowel="a">あ</button>
        <button class="preset-btn" data-vowel="i">い</button>
        <button class="preset-btn" data-vowel="u">う</button>
        <button class="preset-btn" data-vowel="e">え</button>
        <button class="preset-btn" data-vowel="o">お</button>
        <button class="preset-btn" data-vowel="neutral">Flat</button>
        <button id="noise-btn" type="button">Noise</button>
      </div>
      <div id="consonant-demo" class="consonant-demo-buttons">
        <span class="demo-label">子音デモ:</span>
        <button class="consonant-demo-btn" data-consonant="s" type="button">/s/ (さ)</button>
        <button class="consonant-demo-btn" data-consonant="k" type="button">/k/ (か)</button>
        <button class="consonant-demo-btn" data-consonant="t" type="button">/t/ (た)</button>
        <button class="consonant-demo-btn" data-consonant="p" type="button">/p/ (ぱ)</button>
        <button class="consonant-demo-btn nasal" data-consonant="m" type="button">/m/ (ま)</button>
        <button class="consonant-demo-btn nasal" data-consonant="n" type="button">/n/ (な)</button>
        <button class="consonant-demo-btn nasal" data-consonant="ny" type="button">/ɲ/ (に)</button>
      </div>
      <div id="sliders">
        <label class="slider-group">
          <span class="slider-label">F0</span>
          <input id="f0-slider" type="range" min="0" max="1" step="0.001" value="0.379" aria-label="基本周波数 F0" />
          <span id="f0-value">120 Hz</span>
        </label>
        <label class="slider-group">
          <span class="slider-label">Vol</span>
          <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.3" aria-label="音量" />
          <span id="volume-value">30%</span>
        </label>
      </div>
      <div id="voice-quality">
        <label class="slider-group">
          <span class="slider-label">Rd</span>
          <input id="rd-slider" type="range" min="0.3" max="2.7" step="0.1" value="1.0" aria-label="声質 Rd" />
          <span id="rd-value">1.0 Modal</span>
        </label>
        <label class="slider-group">
          <span class="slider-label">Asp</span>
          <input id="aspiration-slider" type="range" min="0" max="1" step="0.01" value="0" aria-label="気息ノイズ" />
          <span id="aspiration-value">0%</span>
        </label>
        <select id="model-select" aria-label="声門モデル">
          <option value="lf" selected>LF</option>
          <option value="klglott88">KLGLOTT88</option>
        </select>
      </div>
      <div id="auto-sing-controls">
        <button id="auto-sing-btn" type="button">Auto Sing</button>
        <label class="slider-group">
          <span class="slider-label">BPM</span>
          <input id="bpm-slider" type="range" min="40" max="200" step="1" value="120" aria-label="テンポ BPM" />
          <span id="bpm-value">120</span>
        </label>
      </div>
      <div id="spectrum-container">
        <canvas id="spectrum-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
        <div id="formant-display">
          <span class="formant f1">F1: --- Hz</span>
          <span class="formant f2">F2: --- Hz</span>
          <span class="formant f3">F3: --- Hz</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
